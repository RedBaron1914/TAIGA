name: CI / CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  build-android:
    needs: release-please
    name: Compile & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Android Version with Cargo
        run: |
          VERSION=$(grep -m 1 '^version = ' crates/taiga-egui/Cargo.toml | cut -d '"' -f 2)
          echo "Building version: $VERSION"
          sed -i "s/versionName = \".*\"/versionName = \"${VERSION}\"" crates/taiga-egui/android/app/build.gradle.kts
          CLEAN_VERSION=$(echo $VERSION | cut -d'-' -f1)
          IFS='.' read -r major minor patch <<< "$CLEAN_VERSION"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))
          sed -i "s/versionCode = .*/versionCode = ${VERSION_CODE}/" crates/taiga-egui/android/app/build.gradle.kts
          echo "Injected versionCode: $VERSION_CODE, versionName: $VERSION"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-universal-build"

      - name: Decode Keystore for Release
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > crates/taiga-egui/android/app/release.keystore
          else
            echo "No keystore secret found, skipping signature."
          fi

      - name: Assemble Universal Release APK
        working-directory: crates/taiga-egui/android
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROCESS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK as Artifact (Available for every commit)
        uses: actions/upload-artifact@v4
        with:
          name: TAIGA-Universal-APK
          path: crates/taiga-egui/android/app/build/outputs/apk/release/*.apk

      - name: Attach APK to GitHub Release
        if: ${{ needs.release-please.outputs.releases_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the tag of the newly created release
          TAG_NAME=$(gh release list --limit 1 | awk '{print $1}')
          echo "Uploading APK to release $TAG_NAME"
          gh release upload "$TAG_NAME" crates/taiga-egui/android/app/build/outputs/apk/release/*.apk --clobber
